<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>在线客服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #07c160;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 70px 15px 80px 15px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message .bubble {
            max-width: 70%;
            padding: 10px 12px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: #07c160;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.admin .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px 15px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }
        .input-area button {
            background: #07c160;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-header">在线客服</div>
    <div class="chat-messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('chat_user_id', userId);
        }

        async function loadMessages() {
            const res = await fetch(`/api/messages?userId=${userId}`);
            const messages = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                addMessageToUI(msg.content, msg.type);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessageToUI(content, type) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = content;
            div.appendChild(bubble);
            container.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content) return;
            addMessageToUI(content, 'user');
            input.value = '';
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, content, type: 'user' })
            });
            const container = document.getElementById('messages');
            container.scrollTop = container.scrollHeight;
        }

        let lastMsgId = 0;
        async function pollNewMessages() {
            const res = await fetch(`/api/new-messages?userId=${userId}&lastId=${lastMsgId}`);
            const newMsgs = await res.json();
            if (newMsgs.length > 0) {
                newMsgs.forEach(msg => {
                    addMessageToUI(msg.content, msg.type);
                    lastMsgId = msg.id;
                });
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        }

        loadMessages();
        setInterval(pollNewMessages, 3000);
    </script>
</body>
</html>
